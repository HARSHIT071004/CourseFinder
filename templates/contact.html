{% extends "base.html" %}
{% block title %}Contact — CourseFinder{% endblock %}
{% block content %}
<section class="contact-page">
    <div class="contact-header">
        <h1>Get in Touch</h1>
        <p>Have feedback, questions, or want to collaborate? Drop us a message.</p>
    </div>

    <div class="contact-container">
        <form class="contact-form" id="contact-form" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <select id="subject" name="subject" required>
                    <option value="" disabled selected>Select a topic</option>
                    <option value="feedback">Feedback</option>
                    <option value="bug">Bug Report</option>
                    <option value="feature">Feature Request</option>
                    <option value="collab">Collaboration</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Send Message</button>
        </form>

        <div class="contact-info">
            <div class="info-card">
                <h3>Project Links</h3>
                <a href="https://github.com/HARSHIT071004/Course-recommender" target="_blank" class="info-link">GitHub Repository</a>
            </div>
            <div class="info-card">
                <h3>Live Demo</h3>
                <a href="https://udemy-harshit-course-recommender.onrender.com" target="_blank" class="info-link">View on Render</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
function handleSubmit(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    const orig = btn.innerHTML;
    btn.innerHTML = 'Message Sent';
    btn.classList.add('btn-success');
    setTimeout(() => {
        btn.innerHTML = orig;
        btn.classList.remove('btn-success');
        e.target.reset();
    }, 2500);
}
</script>
{% endblock %}
